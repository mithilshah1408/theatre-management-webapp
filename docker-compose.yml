services:

  db:
    image: postgres:16
    container_name: cinema_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./cinema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./demo.sql:/docker-entrypoint-initdb.d/02_demo.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cinema"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cinema_backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cinema
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: cinema_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata: